<!-- REFERENCE — Tracker Overlay HTML Templates -->
<!-- These show the styled HTML that trackerRenderers.js produces for sep-gen mode. -->
<!-- In preset mode, equivalent styling comes from regex replacement HTML in the preset JSON. -->
<!--  -->
<!-- Each tracker has its own overlay. They are wrapped in a combined container: -->
<!-- <div class="wl-tracker-overlay-wrapper" data-wl-tracker-group="true"> -->
<!--   ... individual tracker overlays ... -->
<!-- </div> -->
<!--  -->
<!-- The wrapper is inserted after .mes_text on each assistant message that has tracker data. -->
<!-- Overlays are ephemeral DOM elements — rebuilt from chat_metadata on every render. -->


<!-- ═══════════════════════════════════════════════════════ -->
<!-- LOTUS — Status Board (one <details> per character)     -->
<!-- ═══════════════════════════════════════════════════════ -->

<details class="wl-tracker-overlay" data-wl-tracker="lotus" data-wl-lotus-name="Sakura" open
  style="margin:8px 0;font-size:0.82em;opacity:0.86;font-family:'Inter','Segoe UI',sans-serif;">
  <summary style="cursor:pointer;list-style:none;padding:8px 12px;border:1px solid rgba(255,255,255,0.12);border-radius:1px;
    background:radial-gradient(circle at top left,rgba(250,177,160,0.10),transparent 35%),linear-gradient(135deg,rgba(255,255,255,0.045),rgba(255,255,255,0.015));
    box-shadow:0 4px 18px rgba(0,0,0,0.18);">
    <span style="color:#fab1a0;font-weight:700;">Sakura</span>
  </summary>
  <div style="margin-top:4px;padding:10px 12px;line-height:1.45;border:1px solid rgba(255,255,255,0.10);border-top:none;border-radius:0 0 10px 10px;
    background:linear-gradient(135deg,rgba(255,255,255,0.035),rgba(255,255,255,0.012));box-shadow:0 4px 18px rgba(0,0,0,0.14);">
    <!-- Stat bars grid -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:6px 10px;margin:4px 0;font-family:monospace;">
      <span style="white-space:nowrap;">
        <span style="opacity:0.55;font-size:0.85em;">HP</span>
        <span style="display:inline-block;width:42px;height:4px;margin:0 4px;border-radius:99px;vertical-align:middle;
          background:linear-gradient(to right,#ff7675 85%,rgba(255,255,255,0.14) 0);"></span>85
      </span>
      <span style="white-space:nowrap;">
        <span style="opacity:0.55;font-size:0.85em;">HNG</span>
        <span style="display:inline-block;width:42px;height:4px;margin:0 4px;border-radius:99px;vertical-align:middle;
          background:linear-gradient(to right,#c8a97e 60%,rgba(255,255,255,0.14) 0);"></span>60
      </span>
      <span style="white-space:nowrap;">
        <span style="opacity:0.55;font-size:0.85em;">ENG</span>
        <span style="display:inline-block;width:42px;height:4px;margin:0 4px;border-radius:99px;vertical-align:middle;
          background:linear-gradient(to right,#7fa7b8 70%,rgba(255,255,255,0.14) 0);"></span>70
      </span>
      <span style="white-space:nowrap;">
        <span style="opacity:0.55;font-size:0.85em;">HYG</span>
        <span style="display:inline-block;width:42px;height:4px;margin:0 4px;border-radius:99px;vertical-align:middle;
          background:linear-gradient(to right,#6f93a3 90%,rgba(255,255,255,0.14) 0);"></span>90
      </span>
      <span style="white-space:nowrap;">
        <span style="opacity:0.55;font-size:0.85em;">ARO</span>
        <span style="display:inline-block;width:42px;height:4px;margin:0 4px;border-radius:99px;vertical-align:middle;
          background:linear-gradient(to right,#9a7f88 10%,rgba(255,255,255,0.14) 0);"></span>10
      </span>
    </div>
    <!-- Mood -->
    <div style="margin-top:7px;">
      <b style="color:#fdcb6e;opacity:0.85;text-transform:uppercase;font-size:0.72em;letter-spacing:0.08em;">Mood</b>
      Cautiously optimistic
    </div>
    <!-- Thought -->
    <div style="margin-top:8px;padding:7px 9px;border-radius:8px;background:rgba(0,0,0,0.14);color:#dfe6e9;font-style:italic;opacity:0.88;">
      ✦ I wonder if he noticed me watching
    </div>
  </div>
</details>

<!-- TEMPORAL — Environmental State (inline bar)            -->
<!-- ═══════════════════════════════════════════════════════ -->

<div class="wl-tracker-overlay" data-wl-tracker="temporal"
  style="font-size:0.8em;opacity:0.75;margin:4px 0;border-left:2px solid rgba(255,255,255,0.2);padding-left:10px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
  <b style="text-transform:uppercase;font-size:0.85em;opacity:0.6;">ENV</b>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-family:monospace;">
    <span title="Location">LOC <span style="opacity:0.9;color:#81ecec;">Riverside Market District</span></span>
    <span title="Time">TIME <span style="opacity:0.9;color:#fdcb6e;">Late Afternoon</span></span>
    <span title="Weather">WX <span style="opacity:0.9;color:#fab1a0;font-weight:bold;">☀️Sunny</span></span>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════ -->
<!-- RPS — Relationship Tracker (inline bar per character)  -->
<!-- ═══════════════════════════════════════════════════════ -->

<div class="wl-tracker-overlay" data-wl-tracker="rps" data-wl-rps-name="Sakura"
  style="font-size:0.8em;opacity:0.75;margin:4px 0;border-left:2px solid rgba(255,255,255,0.2);padding-left:10px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
  <b style="text-transform:uppercase;font-size:0.85em;opacity:0.6;">Sakura</b>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-family:monospace;">
    <span title="Hostility">HOS
      <span style="display:inline-block;width:40px;height:3px;
        background:linear-gradient(to right,#ff7675 calc(1 * 10%),rgba(255,255,255,0.15) 0);
        vertical-align:middle;margin:0 4px;border-radius:2px;"></span> 1
    </span>
    <span title="Interest">INT
      <span style="display:inline-block;width:40px;height:3px;
        background:linear-gradient(to right,#fdcb6e calc(7 * 10%),rgba(255,255,255,0.15) 0);
        vertical-align:middle;margin:0 4px;border-radius:2px;"></span> 7
    </span>
    <span title="Obligation">OBL
      <span style="display:inline-block;width:40px;height:3px;
        background:linear-gradient(to right,#81ecec calc(3 * 10%),rgba(255,255,255,0.15) 0);
        vertical-align:middle;margin:0 4px;border-radius:2px;"></span> 3
    </span>
    <span title="Trust">TRS
      <span style="display:inline-block;width:40px;height:3px;
        background:linear-gradient(to right,#74b9ff calc(5 * 10%),rgba(255,255,255,0.15) 0);
        vertical-align:middle;margin:0 4px;border-radius:2px;"></span> 5
    </span>
    <span title="Attraction">ATR
      <span style="display:inline-block;width:40px;height:3px;
        background:linear-gradient(to right,#fab1a0 calc(6 * 10%),rgba(255,255,255,0.15) 0);
        vertical-align:middle;margin:0 4px;border-radius:2px;"></span> 6
    </span>
  </div>
</div>
